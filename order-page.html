<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatima's Kitchen — Order Now</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white: #FFFFFF;
  --off-white: #F8FAF7;
  --green-900: #0F2318;
  --green-700: #1A3D2B;
  --green-500: #2D6A4F;
  --green-400: #3D8B65;
  --green-100: #E8F4ED;
  --green-50: #F2FAF5;
  --text: #0F2318;
  --text-mid: #3D5A47;
  --text-muted: #7A9A85;
  --border: #D6EAD9;
  --shadow-sm: 0 1px 4px rgba(15,35,24,0.06);
  --shadow-md: 0 4px 20px rgba(15,35,24,0.10);
  --shadow-lg: 0 12px 48px rgba(15,35,24,0.16);
  --radius: 12px;
  --radius-lg: 16px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* HERO */
.hero { background: var(--green-900); position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 40%, rgba(61,139,101,0.2) 0%, transparent 65%); pointer-events: none; }
.hero-inner { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 1.75rem; display: flex; align-items: center; gap: 1.25rem; position: relative; }
.store-avatar { width: 56px; height: 56px; border-radius: 14px; background: var(--green-500); display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-size: 20px; color: white; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.15); }
.store-name { font-family: 'Instrument Serif', serif; font-size: 1.5rem; color: white; letter-spacing: -0.02em; }
.store-sub { font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-top: 2px; font-weight: 300; }
.hero-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.hero-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.12); font-weight: 400; }
.hero-badge.green { background: rgba(61,139,101,0.25); color: rgba(255,255,255,0.8); border-color: rgba(61,139,101,0.3); }

/* CAT NAV */
.cat-nav { background: var(--green-900); border-top: 1px solid rgba(255,255,255,0.07); overflow-x: auto; scrollbar-width: none; }
.cat-nav::-webkit-scrollbar { display: none; }
.cat-nav-inner { max-width: 640px; margin: 0 auto; padding: 0 1.5rem; display: flex; gap: 0; }
.cat-btn { background: none; border: none; color: rgba(255,255,255,0.4); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; padding: 0.75rem 1rem; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s; }
.cat-btn.active { color: white; border-bottom-color: var(--green-400); }
.cat-btn:hover { color: rgba(255,255,255,0.8); }

/* MAIN */
.main { max-width: 640px; margin: 0 auto; padding: 1.25rem 1.5rem 9rem; }

/* INFO BANNER */
.info-banner { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.85rem 1rem; font-size: 0.8rem; color: var(--text-mid); margin-bottom: 1.25rem; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
.info-banner-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

/* SECTION HEADING */
.section-heading { font-family: 'Instrument Serif', serif; font-size: 1rem; font-weight: 600; color: var(--text); margin: 1.5rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }

/* ITEM CARD */
.item-card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 0.9rem 1rem; display: flex; align-items: center; gap: 0.9rem; margin-bottom: 0.6rem; transition: box-shadow 0.2s, transform 0.15s; }
.item-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.item-emoji { width: 48px; height: 48px; border-radius: 10px; background: var(--green-50); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; border: 1px solid var(--green-100); }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 0.88rem; font-weight: 500; color: var(--text); }
.item-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; font-weight: 300; }
.item-price { font-size: 0.88rem; font-weight: 600; color: var(--green-500); white-space: nowrap; font-family: 'Instrument Serif', serif; }
.item-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.qty-control { display: flex; align-items: center; background: var(--green-50); border-radius: 8px; border: 1px solid var(--green-100); overflow: hidden; }
.qty-btn { background: none; border: none; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; color: var(--green-500); font-weight: 600; transition: background 0.15s; }
.qty-btn:hover { background: var(--green-100); }
.qty-num { width: 24px; text-align: center; font-size: 0.82rem; font-weight: 600; color: var(--text); pointer-events: none; }

/* CART BAR */
.cart-bar { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%); width: calc(100% - 3rem); max-width: 600px; background: var(--green-900); color: white; border-radius: var(--radius-lg); padding: 0.9rem 1.25rem; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-lg); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; }
.cart-bar.visible { opacity: 1; pointer-events: all; }
.cart-left { display: flex; align-items: center; gap: 10px; }
.cart-count { background: var(--green-400); color: white; font-size: 0.72rem; font-weight: 600; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.cart-label { font-size: 0.85rem; font-weight: 500; }
.cart-total { font-family: 'Instrument Serif', serif; font-size: 1.05rem; color: rgba(255,255,255,0.8); }
.cart-cta { background: var(--green-400); color: white; border: none; border-radius: 8px; padding: 0.5rem 1.1rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
.cart-cta:hover { background: var(--green-500); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,35,24,0.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; padding: 0 1.5rem 2.5rem; transform: translateY(30px); transition: transform 0.3s; max-height: 92vh; overflow-y: auto; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle-wrap { position: sticky; top: 0; background: var(--white); padding: 1rem 0 0.5rem; z-index: 10; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto; }
.modal-title { font-family: 'Instrument Serif', serif; font-size: 1.3rem; color: var(--green-900); margin-bottom: 0.25rem; margin-top: 0.5rem; }
.modal-sub { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.25rem; font-weight: 300; }

/* ORDER SUMMARY */
.order-summary { background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.25rem; }
.summary-title { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 0.6rem; }
.summary-line { display: flex; justify-content: space-between; font-size: 0.83rem; color: var(--text-mid); padding: 3px 0; }
.summary-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
.summary-total { display: flex; justify-content: space-between; font-size: 0.95rem; font-weight: 600; color: var(--text); padding: 4px 0; }
.summary-total .price { color: var(--green-500); font-family: 'Instrument Serif', serif; font-size: 1.1rem; }

/* DELIVERY TOGGLE */
.delivery-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.delivery-opt { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 0.85rem; cursor: pointer; transition: all 0.15s; background: var(--white); text-align: center; }
.delivery-opt:hover { border-color: var(--green-400); background: var(--green-50); }
.delivery-opt.selected { border-color: var(--green-400); background: var(--green-50); box-shadow: 0 0 0 2px rgba(61,139,101,0.15); }
.delivery-opt-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
.delivery-opt-label { font-size: 0.82rem; font-weight: 600; color: var(--text); display: block; }
.delivery-opt-sub { font-size: 0.7rem; color: var(--text-muted); display: block; margin-top: 2px; font-weight: 300; }
.delivery-opt.selected .delivery-opt-label { color: var(--green-700); }

/* FORM */
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
.form-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 0.72rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); background: var(--white); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.form-input:focus { border-color: var(--green-400); box-shadow: 0 0 0 3px rgba(61,139,101,0.1); }
.form-input::placeholder { color: var(--text-muted); font-weight: 300; }
.delivery-fields { display: none; }
.delivery-fields.show { display: block; }
.delivery-fee-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; font-weight: 300; }

/* SUBMIT */
.submit-btn { width: 100%; background: var(--green-900); color: white; border: none; border-radius: var(--radius); padding: 0.95rem; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 0.25rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
.submit-btn:hover { background: var(--green-700); }

/* SUCCESS */
.success-screen { text-align: center; padding: 1.5rem 0 1rem; }
.success-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--green-100); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 1rem; animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.success-screen h2 { font-family: 'Instrument Serif', serif; font-size: 1.4rem; color: var(--green-900); margin-bottom: 0.5rem; }
.success-screen p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; font-weight: 300; }
.success-detail { background: var(--green-50); border: 1px solid var(--green-100); border-radius: var(--radius); padding: 0.85rem 1rem; margin: 1.25rem 0; text-align: left; }
.success-detail-line { font-size: 0.82rem; color: var(--text-mid); padding: 3px 0; }
.success-detail-line strong { color: var(--text); font-weight: 500; }

/* RUSH ORDER */
.rush-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.rush-opt { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 0.85rem; cursor: pointer; transition: all 0.15s; background: var(--white); text-align: center; }
.rush-opt:hover { border-color: var(--green-400); background: var(--green-50); }
.rush-opt.selected { border-color: var(--green-400); background: var(--green-50); box-shadow: 0 0 0 2px rgba(61,139,101,0.15); }
.rush-opt.rush-selected { border-color: #F59E0B; background: #FFFBEB; box-shadow: 0 0 0 2px rgba(245,158,11,0.15); }
.rush-opt-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
.rush-opt-label { font-size: 0.82rem; font-weight: 600; color: var(--text); display: block; }
.rush-opt-sub { font-size: 0.7rem; color: var(--text-muted); display: block; margin-top: 2px; font-weight: 300; }
.rush-opt.rush-selected .rush-opt-label { color: #92400E; }
.rush-opt.rush-selected .rush-opt-sub { color: #B45309; }
.powered-by { text-align: center; padding: 2rem 0 1rem; font-size: 0.72rem; color: var(--text-muted); }
.powered-by a { color: var(--green-400); text-decoration: none; font-weight: 500; }

@media (max-width: 480px) {
  .main { padding: 1rem 1rem 9rem; }
  .hero-inner { padding: 1.5rem 1rem; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="store-avatar" id="storeAvatar">FK</div>
    <div>
      <div class="store-name" id="storeName">Fatima's Kitchen</div>
      <div class="store-sub" id="storeCity">Cape Town · Home Catering</div>
      <div class="hero-badges">
        <span class="hero-badge green" id="orderDeadline">🕐 Orders close Thursdays</span>
        <span class="hero-badge" id="deliveryBadge">🚚 Delivery available</span>
      </div>
    </div>
  </div>
</div>

<nav class="cat-nav">
  <div class="cat-nav-inner" id="catNav">
    <button class="cat-btn active" onclick="filterCat('all', this)">All</button>
  </div>
</nav>

<main class="main">
  <div class="info-banner">
    <span class="info-banner-icon">ℹ️</span>
    <span>Browse the menu, add items to your cart, then place your order. You'll get a WhatsApp confirmation shortly after.</span>
  </div>
  <div id="menuContainer"></div>
</main>

<div class="cart-bar" id="cartBar" onclick="openModal()">
  <div class="cart-left">
    <div class="cart-count" id="cartCount">0</div>
    <span class="cart-label">View order</span>
  </div>
  <span class="cart-total" id="cartTotal">R0</span>
  <button class="cart-cta">Place order →</button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle-wrap"><div class="modal-handle"></div></div>
    <div id="modalContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qhcdlfnsjdspisjkfndq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoY2RsZm5zamRzcGlzamtmbmRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDc3MTAsImV4cCI6MjA5NjYyMzcxMH0.1S4jvY38z-0XI22QwlB0Kkr4ttt-ptvDKRayEbk5Bgo';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──────────────────────────────────────────────────────────
let cart = {};
let currentCat = 'all';
let menuItems = [];
let storeProfile = null;
let deliveryChoice = 'collection';
let rushChoice = 'standard';
let invoiceNumber = Math.floor(Math.random() * 9000) + 1000;

// ── LOAD STORE ─────────────────────────────────────────────────────
async function loadStore() {
  // Get slug from URL: order-page.html?store=fatimaskitchen
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('store') || 'fatimaskitchen';

  const { data: profile } = await db
    .from('profiles')
    .select('*')
    .eq('store_slug', slug)
    .maybeSingle();

  if (profile) {
    storeProfile = profile;
    const initials = profile.store_name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('storeAvatar').textContent = initials;
    document.getElementById('storeName').textContent = profile.store_name;
    document.getElementById('storeCity').textContent = (profile.city || '') + (profile.food_type ? ' · ' + profile.food_type : '');
    document.title = profile.store_name + ' — Order Now';
    if (!profile.delivery_fee || profile.delivery_fee === 0) {
      document.getElementById('deliveryBadge').style.display = 'none';
    }
  }

  await loadMenu(profile?.id);
}

// ── LOAD MENU ──────────────────────────────────────────────────────
async function loadMenu(profileId) {
  let query = db.from('menu_items').select('*').eq('is_available', true);
  if (profileId) query = query.eq('profile_id', profileId);

  const { data: items } = await query;

  if (items && items.length > 0) {
    menuItems = items;
  } else {
    // Demo items if no real menu yet
    menuItems = [
      { id:1, cat:'mains', emoji:'🍛', name:'Chicken Biryani', price:120, description:'Served with raita & salad' },
      { id:2, cat:'mains', emoji:'🥘', name:'Lamb Curry', price:150, description:'Slow cooked, served with rice' },
      { id:3, cat:'mains', emoji:'🥙', name:'Full Gatsby', price:95, description:'Your choice of filling' },
      { id:4, cat:'sides', emoji:'🥧', name:'Milk Tart', price:50, description:'Homemade, whole tart' },
      { id:5, cat:'sides', emoji:'🍢', name:'Samoosas (5pk)', price:55, description:'Crispy, spiced filling' },
      { id:6, cat:'sides', emoji:'🍰', name:'Malva Pudding', price:65, description:'Served warm with custard' },
    ];
  }

  buildCatNav();
  renderMenu();
}

// ── CAT NAV ────────────────────────────────────────────────────────
function buildCatNav() {
  const cats = [...new Set(menuItems.map(i => i.cat || 'menu'))];
  const nav = document.getElementById('catNav');
  nav.innerHTML = `<button class="cat-btn active" onclick="filterCat('all', this)">All</button>`;
  cats.forEach(cat => {
    const label = cat.charAt(0).toUpperCase() + cat.slice(1);
    nav.innerHTML += `<button class="cat-btn" onclick="filterCat('${cat}', this)">${label}</button>`;
  });
}

// ── RENDER MENU ────────────────────────────────────────────────────
function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const container = document.getElementById('menuContainer');
  const cats = [...new Set(menuItems.map(i => i.cat || 'menu'))];
  let html = '';

  cats.forEach(cat => {
    const items = menuItems.filter(i => (i.cat || 'menu') === cat && (currentCat === 'all' || currentCat === cat));
    if (!items.length) return;
    const label = cat.charAt(0).toUpperCase() + cat.slice(1);
    html += `<h2 class="section-heading">${label}</h2>`;
    items.forEach(item => {
      const qty = cart[item.id] || 0;
      html += `
        <div class="item-card">
          <div class="item-emoji">${item.emoji || '🍱'}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
          </div>
          <div class="item-right">
            <span class="item-price">R${item.price}</span>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
              <span class="qty-num" id="qty-${item.id}">${qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            </div>
          </div>
        </div>`;
    });
  });

  container.innerHTML = html || '<p style="color:var(--text-muted);font-size:0.85rem;padding:1rem 0;">No items available yet.</p>';
}

// ── CART ───────────────────────────────────────────────────────────
function changeQty(id, delta) {
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  if (cart[id] === 0) delete cart[id];
  const el = document.getElementById('qty-' + id);
  if (el) el.textContent = cart[id] || 0;
  updateCartBar();
}

function getCartTotals(includeExtras = false) {
  const subtotal = Object.entries(cart).reduce((s, [id, qty]) => {
    const item = menuItems.find(i => i.id == id);
    return s + (item ? item.price * qty : 0);
  }, 0);
  const deliveryFee = (includeExtras && deliveryChoice === 'delivery') ? (storeProfile?.delivery_fee || 60) : 0;
  const rushFee = (includeExtras && rushChoice === 'rush') ? (storeProfile?.rush_fee || 100) : 0;
  return { subtotal, deliveryFee, rushFee, total: subtotal + deliveryFee + rushFee };
}

function updateCartBar() {
  const totalItems = Object.values(cart).reduce((s, v) => s + v, 0);
  const { total } = getCartTotals();
  document.getElementById('cartCount').textContent = totalItems;
  document.getElementById('cartTotal').textContent = 'R' + total;
  document.getElementById('cartBar').classList.toggle('visible', totalItems > 0);
}

// ── MODAL ──────────────────────────────────────────────────────────
function openModal() {
  if (!Object.keys(cart).length) return;
  renderOrderModal();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function selectDelivery(type) {
  deliveryChoice = type;
  document.querySelectorAll('.delivery-opt').forEach(o => o.classList.remove('selected'));
  document.getElementById('opt-' + type).classList.add('selected');
  const fields = document.getElementById('deliveryFields');
  fields.classList.toggle('show', type === 'delivery');
  updateSummaryTotal();
}

function updateSummaryTotal() {
  const { subtotal, deliveryFee, rushFee, total } = getCartTotals(true);
  const el = document.getElementById('summaryTotal');
  if (!el) return;
  let extras = '';
  if (deliveryFee > 0) extras += `<div class="summary-line" style="font-size:0.78rem;"><span>🚗 Delivery fee</span><span>R${deliveryFee}</span></div>`;
  if (rushFee > 0) extras += `<div class="summary-line" style="font-size:0.78rem;color:#B45309;"><span>⚡ Rush order fee</span><span>R${rushFee}</span></div>`;
  el.innerHTML = `
    ${extras}
    <hr class="summary-divider" style="margin:6px 0;">
    <div class="summary-total"><span>Total</span><span class="price">R${total}</span></div>
  `;
}

function selectRush(type) {
  rushChoice = type;
  document.querySelectorAll('.rush-opt').forEach(o => {
    o.classList.remove('selected', 'rush-selected');
  });
  const el = document.getElementById('rush-' + type);
  el.classList.add(type === 'rush' ? 'rush-selected' : 'selected');
  updateSummaryTotal();
}

function renderOrderModal() {
  rushChoice = 'standard';
  const cartItems = Object.entries(cart).map(([id, qty]) => {
    const item = menuItems.find(i => i.id == id);
    return { ...item, qty };
  });
  const { subtotal } = getCartTotals();
  const deliveryFee = storeProfile?.delivery_fee || 60;
  const rushFee = storeProfile?.rush_fee || 100;
  const rushEnabled = storeProfile?.rush_orders_enabled !== false;

  let summaryLines = cartItems.map(i =>
    `<div class="summary-line"><span>${i.qty}× ${i.name}</span><span>R${i.price * i.qty}</span></div>`
  ).join('');

  const rushSection = rushEnabled ? `
    <div class="form-group">
      <label class="form-label">How soon do you need this?</label>
      <div class="rush-toggle">
        <div class="rush-opt selected" id="rush-standard" onclick="selectRush('standard')">
          <span class="rush-opt-icon">📅</span>
          <span class="rush-opt-label">Standard</span>
          <span class="rush-opt-sub">Ready in 3–5 days</span>
        </div>
        <div class="rush-opt" id="rush-rush" onclick="selectRush('rush')">
          <span class="rush-opt-icon">⚡</span>
          <span class="rush-opt-label">Rush order</span>
          <span class="rush-opt-sub">Ready in 1–3 days · +R${rushFee}</span>
        </div>
      </div>
    </div>` : '';

  document.getElementById('modalContent').innerHTML = `
    <h2 class="modal-title">Your order</h2>
    <p class="modal-sub">Review your items and fill in your details below.</p>
    <div class="order-summary">
      <div class="summary-title">Order summary</div>
      ${summaryLines}
      <div id="summaryTotal"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Delivery or collection?</label>
      <div class="delivery-toggle">
        <div class="delivery-opt selected" id="opt-collection" onclick="selectDelivery('collection')">
          <span class="delivery-opt-icon">🏠</span>
          <span class="delivery-opt-label">Collection</span>
          <span class="delivery-opt-sub">Pick up from ${storeProfile?.city || 'the store'}</span>
        </div>
        <div class="delivery-opt" id="opt-delivery" onclick="selectDelivery('delivery')">
          <span class="delivery-opt-icon">🚗</span>
          <span class="delivery-opt-label">Delivery</span>
          <span class="delivery-opt-sub">+R${deliveryFee} delivery fee</span>
        </div>
      </div>
    </div>
    <div class="delivery-fields" id="deliveryFields">
      <div class="form-group">
        <label class="form-label">Delivery address</label>
        <input class="form-input" id="f-address" type="text" placeholder="Street address, suburb" />
      </div>
    </div>
    ${rushSection}
    <div class="form-group">
      <label class="form-label">Your name</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Aisha Davids" autocomplete="name" />
    </div>
    <div class="form-group">
      <label class="form-label">WhatsApp number</label>
      <input class="form-input" id="f-phone" type="tel" placeholder="+27 82 000 0000" autocomplete="tel" />
    </div>
    <div class="form-group">
      <label class="form-label">Special requests (optional)</label>
      <input class="form-input" id="f-notes" type="text" placeholder="Allergies, custom messages, etc." />
    </div>
    <button class="submit-btn" onclick="submitOrder()">
      <span>Confirm order</span> <span>→</span>
    </button>
  `;
  updateSummaryTotal();
}
    </button>
  `;
  updateSummaryTotal();
}

// ── SUBMIT ORDER ───────────────────────────────────────────────────
async function submitOrder() {
  const name  = document.getElementById('f-name')?.value.trim();
  const phone = document.getElementById('f-phone')?.value.trim();
  const addr  = document.getElementById('f-address')?.value.trim();
  const notes = document.getElementById('f-notes')?.value.trim();

  if (!name || !phone) {
    alert('Please fill in your name and WhatsApp number.');
    return;
  }
  if (deliveryChoice === 'delivery' && !addr) {
    alert('Please enter your delivery address.');
    return;
  }

  const cartItems = Object.entries(cart).map(([id, qty]) => {
    const item = menuItems.find(i => i.id == id);
    return { id, name: item.name, price: item.price, qty };
  });

  const { subtotal, deliveryFee, rushFee, total } = getCartTotals(true);

  // Save order to Supabase
  if (storeProfile) {
    await db.from('orders').insert({
      profile_id:     storeProfile.id,
      customer_name:  name,
      customer_phone: phone,
      items:          cartItems,
      total:          total,
      delivery_type:  deliveryChoice,
      notes:          (addr ? 'Address: ' + addr + '. ' : '') + (rushChoice === 'rush' ? '⚡ RUSH ORDER. ' : '') + (notes || ''),
      status:         'new',
    });
  }

  // Build WhatsApp message
  const itemLines = cartItems.map(i => `${i.qty}× ${i.name} — R${i.price * i.qty}`).join('\n');
  const msg = encodeURIComponent(
    `Hi ${storeProfile?.store_name || 'there'}! 🛍️ New order from ${name}\n\n` +
    itemLines + '\n\n' +
    `${deliveryChoice === 'delivery' ? `🚗 Delivery to: ${addr}\nDelivery fee: R${deliveryFee}` : '🏠 Collection'}\n` +
    `${rushChoice === 'rush' ? `⚡ RUSH ORDER (+R${rushFee}) — needed in 1–3 days\n` : '📅 Standard order — 3–5 days\n'}` +
    (notes ? `Notes: ${notes}\n` : '') +
    `\n💰 Total: R${total}\n📱 Customer: ${phone}`
  );

  const waNumber = storeProfile?.whatsapp?.replace(/\D/g, '') || '27820000000';
  const waFormatted = waNumber.startsWith('0') ? '27' + waNumber.slice(1) : waNumber;

  // Show success
  document.getElementById('modalContent').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✓</div>
      <h2>Order placed!</h2>
      <p>${storeProfile?.store_name || 'The store'} will confirm your order on WhatsApp shortly.</p>
      <div class="success-detail">
        <div class="success-detail-line"><strong>Name:</strong> ${name}</div>
        <div class="success-detail-line"><strong>${deliveryChoice === 'delivery' ? 'Delivery to' : 'Collection from'}:</strong> ${deliveryChoice === 'delivery' ? addr : (storeProfile?.city || 'store')}</div>
        <div class="success-detail-line"><strong>Order type:</strong> ${rushChoice === 'rush' ? '⚡ Rush order (1–3 days)' : '📅 Standard (3–5 days)'}</div>
        <div class="success-detail-line"><strong>Total:</strong> R${total}</div>
      </div>
      <p style="font-size:0.78rem;color:var(--text-muted);">Keep an eye on your WhatsApp for confirmation.</p>
    </div>
  `;

  window.open(`https://wa.me/${waFormatted}?text=${msg}`, '_blank');
  cart = {};
  updateCartBar();
  renderMenu();
}

loadStore();
